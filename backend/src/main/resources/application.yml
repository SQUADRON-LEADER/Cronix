spring:
  application:
    name: cronix-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cronix}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  jwt:
    # 256-bit base64-encoded secret key for HS256: "CronixDistributedJobSchedulerSecretKeySecretKey123!"
    secret: ${JWT_SECRET:Q3Jvbml4RGlzdHJpYnV0ZWRKb2JTY2hlZHVsZXJTZWNyZXRLZXlTZWNyZXRLZXkxMjMh}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
  
  worker:
    enabled: ${WORKER_ENABLED:true}
    name: ${WORKER_NAME:node-default}
    poll-interval-ms: 1000
    heartbeat-interval-ms: 5000
    stale-threshold-ms: 30000
    concurrency:
      core-pool-size: 10
      max-pool-size: 20
      queue-capacity: 100

logging:
  level:
    root: INFO
    com.cronix.backend: DEBUG
    org.springframework.security: INFO
